<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yash Gupta — Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap');

    :root {
      --bg: #f6f4f1;
      --card: #ffffff;
      --ink: #111111;
      --muted: #5f5f5f;
      --border: #e7e3dc;
      --accent: #2f6fed;
      --shadow: 0 12px 40px rgba(17, 17, 17, 0.10);
    }

    [data-theme="dark"] {
      --bg: #0f1113;
      --card: #16191d;
      --ink: #f4f4f2;
      --muted: #a0a6ad;
      --border: #2a2f36;
      --accent: #7aa2ff;
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0.9) 0%, transparent 50%),
        radial-gradient(1000px 800px at 120% 10%, rgba(120,160,255,0.18) 0%, transparent 45%),
        var(--bg);
      color: var(--ink);
      line-height: 1.55;
      transition: background 0.6s ease, color 0.4s ease;
    }

    .wrap {
      max-width: 1040px;
      margin: 64px auto 96px;
      padding: 0 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
    }

    .nav-links a { border: none; color: var(--muted); }
    .nav-links a:hover { color: var(--ink); }

    .menu-btn {
      display: none;
      border: 1px solid var(--border);
      background: transparent;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 20;
    }

    .mobile-menu.open { opacity: 1; pointer-events: auto; }

    .mobile-panel {
      width: min(78%, 320px);
      height: 100%;
      background: var(--card);
      border-left: 1px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .mobile-panel a { border: none; color: var(--ink); }

    @media (max-width: 780px) {
      .nav-links { display: none; }
      .menu-btn { display: inline-flex; align-items: center; gap: 6px; }
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 30px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: -40% -20% auto auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle at center, rgba(47,111,237,0.18), transparent 60%);
      opacity: 0.7;
      pointer-events: none;
    }

    .eyebrow {
      font-size: 0.85rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
    }

    h1 {
      font-family: Fraunces, ui-serif, Georgia, serif;
      font-size: clamp(2.6rem, 4vw, 3.6rem);
      margin: 0;
      letter-spacing: -0.02em;
    }

    .subtitle { color: var(--muted); font-size: 1.05rem; }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(250,249,247,0.8);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    @media (min-width: 900px) {
      .grid { grid-template-columns: 2.1fr 1fr; }
    }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    section:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    h2 {
      font-size: 0.9rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 12px;
    }

    .item { margin-bottom: 14px; }
    .item:last-child { margin-bottom: 0; }
    .role { font-weight: 600; }
    .meta { color: var(--muted); font-size: 0.95rem; }

    .timeline {
      border-left: 2px solid var(--border);
      padding-left: 16px;
    }

    .timeline .item {
      position: relative;
      padding-bottom: 4px;
    }

    .timeline .item::before {
      content: "";
      position: absolute;
      left: -24px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .timeline .item.active::before {
      background: var(--accent);
      transform: scale(1.2);
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    ul { margin: 8px 0 0 20px; padding: 0; }

    a { color: var(--ink); text-decoration: none; border-bottom: 1px solid #d5d1c9; }
    a:hover { border-bottom-color: #999; }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
    }

    .btn {
      border: 1px solid var(--border);
      background: transparent;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }

    .btn:hover { border-color: var(--accent); color: var(--ink); }

    .blog-list { display: grid; gap: 12px; }
    .blog-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.7);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    [data-theme="dark"] .blog-card { background: rgba(22,25,29,0.9); }
    .blog-card[open] { box-shadow: var(--shadow); transform: translateY(-1px); }
    .blog-card summary { list-style: none; cursor: pointer; }
    .blog-card summary::-webkit-details-marker { display: none; }
    .blog-title { font-weight: 600; }
    .blog-meta { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }
    .blog-tags { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.75rem;
      color: var(--muted);
      background: rgba(250,249,247,0.7);
    }
    .blog-body { margin-top: 8px; }
    .blog-body p { margin: 0 0 8px; }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const data = {
      name: "Yash Gupta",
      title: "Senior Software Engineer, Platform — C3 AI",
      location: "Redwood City, CA · On‑site",
      interests: "Distributed Systems · Machine Learning",
      badges: ["Building Agentic AI Platform", "LLMs · Generative AI"],
      about: "Focused on building scalable, production‑grade AI systems. Interests centered on distributed systems and machine learning.",
      experience: [
        {
          role: "Senior Software Engineer, Platform — C3 AI",
          meta: "Jul 2021 – Present · Redwood City, CA · On‑site",
          link: "https://c3.ai/c3-agentic-ai-platform/",
          details: ["Building Agentic AI Platform"],
        },
        {
          role: "Corporate VC Associate — Corporate Startup Lab (CMU Swartz Center)",
          meta: "Feb 2021 – May 2021 · United States",
          details: [],
        },
        {
          role: "Graduate Research Intern (CyLab & Bossanova) — Carnegie Mellon University",
          meta: "May 2020 – May 2021 · Pittsburgh, PA",
          details: [
            "Bossanova Robotics (May–Aug 2020): Built ResNet50/EfficientNet models in PyTorch on 5M+ images to detect misplaced/out‑of‑stock products. Achieved >95% pairwise accuracy.",
            "Prof. Osman Yagan (Jan–May 2021): Worked with ThaiBev to improve customer acquisition and revenue via targeted promotions.",
          ],
        },
        {
          role: "Research Assistant — Nanyang Technological University",
          meta: "Jan 2019 – May 2019 · Singapore",
          details: [],
        },
        {
          role: "Research Assistant — Ghent University",
          meta: "May 2018 – Jun 2018 · Gent Area, Belgium",
          details: [],
        },
      ],
      projects: [
        { name: "PandasAI", meta: "Maker & contributor · 10k+ GitHub stars · $1M+ funding" },
      ],
      blogs: [
        {
          title: "AI in 2026: The Stack Has Shifted",
          date: "Feb 2026",
          summary: "Models are table stakes; systems are the moat.",
          tags: ["AI Trends", "Systems", "Production"],
          body: [
            "The model is no longer the product. The product is the system: retrieval, tool use, evaluation, and monitoring working together under strict latency and cost constraints.",
            "Teams that win treat prompts and tools like software artifacts — versioned, tested, and instrumented — and they route tasks across a portfolio of models rather than betting on a single one.",
            "The new differentiator is feedback. Data flywheels, human review, and automated evals turn good demos into reliable systems.",
            "In short: infrastructure is the advantage, and operational rigor is what scales AI beyond novelty.",
          ],
        },
        {
          title: "Agents Need Constraints, Not Magic",
          date: "Feb 2026",
          summary: "Durability comes from guardrails and verification.",
          tags: ["Agents", "Safety", "Product"],
          body: [
            "Great agents look less like free‑form chat and more like constrained workflows. The secret is making actions explicit, reversible, and observable.",
            "Permissions should be scoped, tool contracts should be clear, and every critical step should have a verification layer — either automatic or human‑in‑the‑loop.",
            "This approach feels slower at first, but it prevents silent failures, reduces risk, and builds user trust over time.",
            "The future is not “hands‑off AI” — it’s “hands‑on leverage.”",
          ],
        },
        {
          title: "OpenClaw & the Personal AI Stack",
          date: "Feb 2026",
          summary: "Local‑first assistants and owned context.",
          tags: ["OpenClaw", "Future", "Privacy"],
          body: [
            "We’re moving toward assistants that run close to our data and integrate services without handing control to a single cloud vendor.",
            "OpenClaw‑style architectures enable that: local workflows, configurable tool gateways, and granular permissions for every action.",
            "Pairing local context with selective cloud compute gives you speed, privacy, and flexibility — without sacrificing capability.",
            "The endgame is a personal AI operating layer: secure, composable, and tuned to how you work.",
          ],
        },
      ],
      ],
      education: [
        { name: "Carnegie Mellon University", meta: "MS, Electrical & Computer Engineering · GPA 3.89/4.0", extra: "Eta Kappa Nu ECE Honors Society" },
        { name: "Manipal Institute of Technology", meta: "BTech, Electronics & Communications Engineering · GPA 9.25/10", extra: "VP IE‑E&C" },
      ],
      awards: [
        { name: "Nikola Tesla Electrical Engineering Scholar (declined)", meta: "Columbia University · Feb 2019" },
        { name: "Gold Medal for Excellence in Academics", meta: "Mar 2017" },
        { name: "Merit Scholarship", meta: "Manipal University · Jul 2015" },
      ],
      scores: [
        { name: "GRE — 326 (168Q / 158V)", meta: "Oct 2018" },
      ],
      contact: {
        linkedin: "https://www.linkedin.com/in/yash-cmu",
        email: null, // set to your public email if you want a copy button
      }
    };

    function useReveal() {
      useEffect(() => {
        const elements = document.querySelectorAll('[data-reveal]');
        const observer = new IntersectionObserver(
          entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) entry.target.classList.add('visible');
            });
          },
          { threshold: 0.12 }
        );
        elements.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);
    }

    function ThemeToggle() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
        localStorage.setItem('theme', theme);
      }, [theme]);

      return (
        <button className="btn" onClick={() => setTheme(t => (t === 'dark' ? 'light' : 'dark'))}>
          {theme === 'dark' ? 'Light mode' : 'Dark mode'}
        </button>
      );
    }

    function CopyEmail({ email }) {
      const [copied, setCopied] = useState(false);
      if (!email) return null;
      return (
        <button
          className="btn"
          onClick={() => {
            navigator.clipboard.writeText(email);
            setCopied(true);
            setTimeout(() => setCopied(false), 1400);
          }}
        >
          {copied ? 'Copied' : 'Copy email'}
        </button>
      );
    }

    function App() {
      const [active, setActive] = useState(0);
      const [menuOpen, setMenuOpen] = useState(false);
      const navItems = useMemo(() => ([
        { id: 'about', label: 'About' },
        { id: 'experience', label: 'Experience' },
        { id: 'projects', label: 'Projects' },
        { id: 'blog', label: 'Blog' },
        { id: 'education', label: 'Education' },
        { id: 'awards', label: 'Awards' },
        { id: 'scores', label: 'Scores' },
        { id: 'contact', label: 'Contact' },
      ]), []);

      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setMenuOpen(false);
      };

      useReveal();

      return (
        <div className="wrap">
          <div className="topbar">
            <div className="brand">{data.name}</div>
            <nav className="nav-links">
              {navItems.map(item => (
                <a
                  key={item.id}
                  href={`#${item.id}`}
                  onClick={(e) => { e.preventDefault(); scrollTo(item.id); }}
                >
                  {item.label}
                </a>
              ))}
            </nav>
            <button className="menu-btn" onClick={() => setMenuOpen(true)}>Menu ☰</button>
          </div>

          <div className={`mobile-menu ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(false)}>
            <div className="mobile-panel" onClick={(e) => e.stopPropagation()}>
              {navItems.map(item => (
                <a
                  key={item.id}
                  href={`#${item.id}`}
                  onClick={(e) => { e.preventDefault(); scrollTo(item.id); }}
                >
                  {item.label}
                </a>
              ))}
              <ThemeToggle />
            </div>
          </div>

          <div className="hero reveal" data-reveal>
            <div className="eyebrow">Portfolio</div>
            <h1>{data.name}</h1>
            <div className="subtitle">{data.title}</div>
            <div className="meta-line">
              <span>{data.location}</span>
              <span>Interests: {data.interests}</span>
            </div>
            <div className="meta-line">
              {data.badges.map(b => <span key={b} className="pill">{b}</span>)}
            </div>
            <div className="toolbar">
              <ThemeToggle />
            </div>
          </div>

          <div className="grid">
            <div>
              <section id="about" className="reveal" data-reveal>
                <h2>About</h2>
                <p>{data.about}</p>
              </section>

              <section id="experience" className="reveal" data-reveal style={{ marginTop: 16 }}>
                <h2>Experience</h2>
                <div className="timeline">
                  {data.experience.map((x, idx) => (
                    <div
                      key={x.role}
                      className={`item ${idx === active ? 'active' : ''}`}
                      onMouseEnter={() => setActive(idx)}
                      onFocus={() => setActive(idx)}
                      onMouseLeave={() => setActive(idx)}
                    >
                      <div className="role">{x.role}</div>
                      <div className="meta">{x.meta}</div>
                      {x.link && (
                        <div className="meta">
                          <a href={x.link} target="_blank" rel="noreferrer">Link</a>
                        </div>
                      )}
                      {idx === active && x.details?.length > 0 && (
                        <ul>
                          {x.details.map(d => <li key={d}>{d}</li>)}
                        </ul>
                      )}
                    </div>
                  ))}
                </div>
              </section>

              <section id="projects" className="reveal" data-reveal style={{ marginTop: 16 }}>
                <h2>Projects</h2>
                {data.projects.map(p => (
                  <div className="item" key={p.name}>
                    <div className="role">{p.name}</div>
                    <div className="meta">{p.meta}</div>
                  </div>
                ))}
              </section>

            </div>

            <div>
              <section id="education" className="reveal" data-reveal>
                <h2>Education</h2>
                {data.education.map(e => (
                  <div className="item" key={e.name}>
                    <div className="role">{e.name}</div>
                    <div className="meta">{e.meta}</div>
                    <div className="meta">{e.extra}</div>
                  </div>
                ))}
              </section>

              <section id="awards" className="reveal" data-reveal style={{ marginTop: 16 }}>
                <h2>Awards</h2>
                {data.awards.map(a => (
                  <div className="item" key={a.name}>
                    <div className="role">{a.name}</div>
                    <div className="meta">{a.meta}</div>
                  </div>
                ))}
              </section>

              <section id="scores" className="reveal" data-reveal style={{ marginTop: 16 }}>
                <h2>Test Scores</h2>
                {data.scores.map(s => (
                  <div className="item" key={s.name}>
                    <div className="role">{s.name}</div>
                    <div className="meta">{s.meta}</div>
                  </div>
                ))}
              </section>

              <section id="contact" className="reveal" data-reveal style={{ marginTop: 16 }}>
                <h2>Contact</h2>
                <div className="item"><a href={data.contact.linkedin} target="_blank" rel="noreferrer">LinkedIn</a></div>
                <div className="toolbar">
                  <CopyEmail email={data.contact.email} />
                </div>
              </section>

              <div className="footer">Send skills + full projects + contact links any time and I’ll refine it.</div>
            </div>
          </div>

          <section id="blog" className="reveal" data-reveal style={{ marginTop: 18 }}>
            <h2>Blog</h2>
            <div className="blog-list">
              {data.blogs.map((b, i) => (
                <details className="blog-card" key={b.title}>
                  <summary>
                    <div className="blog-title">{b.title}</div>
                    <div className="blog-meta">{b.date} · {b.summary}</div>
                    <div className="blog-tags">
                      {b.tags.map(t => <span key={t} className="tag">{t}</span>)}
                    </div>
                  </summary>
                  <div className="blog-body">
                    {b.body.map((p, idx) => <p key={`${i}-${idx}`}>{p}</p>)}
                  </div>
                </details>
              ))}
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
