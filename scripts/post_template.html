<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} — Yash Gupta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap');
    :root {
      --bg: #f6f4f1;
      --card: #ffffff;
      --ink: #111111;
      --muted: #5f5f5f;
      --border: #e7e3dc;
      --accent: #2f6fed;
      --shadow: 0 12px 40px rgba(17, 17, 17, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0.9) 0%, transparent 50%),
        radial-gradient(1000px 800px at 120% 10%, rgba(120,160,255,0.18) 0%, transparent 45%),
        var(--bg);
      color: var(--ink);
      line-height: 1.55;
      transition: background 0.6s ease, color 0.4s ease;
    }
    .wrap { max-width: 1040px; margin: 64px auto 96px; padding: 0 24px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .brand { font-weight: 600; letter-spacing: 0.01em; }
    .nav-links { display: flex; gap: 16px; font-size: 0.9rem; }
    .nav-links a { border: none; color: var(--muted); text-decoration: none; }
    .nav-links a:hover { color: var(--ink); }
    .menu-btn { display: none; border: 1px solid var(--border); background: transparent; padding: 6px 10px; border-radius: 10px; font-size: 0.9rem; color: var(--muted); cursor: pointer; }
    .mobile-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 20; }
    .mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-panel { width: min(78%, 320px); height: auto; max-height: 70vh; margin: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); display: grid; gap: 10px; align-content: start; justify-items: start; }
    .mobile-panel a { border: none; color: var(--ink); text-decoration: none; }
    @media (max-width: 780px) { .nav-links { display: none; } .menu-btn { display: inline-flex; align-items: center; gap: 6px; } }
    .eyebrow { font-size: 0.85rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; }
    .eyebrow::before { content: ""; width: 10px; height: 10px; border-radius: 999px; background: var(--accent); }
    h1 { font-family: Fraunces, ui-serif, Georgia, serif; font-size: clamp(2.4rem, 4vw, 3.4rem); margin: 0; }
    .post { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); }
    .post h1 { margin: 0 0 6px; }
    .post-meta { color: var(--muted); font-size: 0.95rem; }
    .blog-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px; font-size: 0.75rem; color: var(--muted); background: rgba(250,249,247,0.7); }
    .post-body { margin-top: 14px; }
    .post-body p { margin: 0 0 12px; }
    .sources { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .sources h3 { font-size: 0.85rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
    .sources a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
    .sources a:hover { border-bottom-color: var(--accent); }
    .sources ul { margin: 0; padding: 0 0 0 20px; }
    .sources li { margin-bottom: 4px; font-size: 0.9rem; color: var(--muted); }
    .site-footer { margin-top: 32px; color: var(--muted); font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Yash Gupta</div>
      <nav class="nav-links">
        <a href="/index.html#about">About Me</a>
        <a href="/blog/">Blog</a>
      </nav>
      <button id="menu-open" class="menu-btn">Menu &#9776;</button>
    </div>
    <div id="mobile-menu" class="mobile-menu">
      <div class="mobile-panel">
        <button id="menu-close" class="btn menu-close">Close &#10005;</button>
        <a href="/index.html#about">About Me</a>
        <a href="/blog/">Blog</a>
      </div>
    </div>
    <div class="post">
      <div class="eyebrow">Blog</div>
      <h1>{{TITLE}}</h1>
      <div class="post-meta">{{DATE}} &middot; {{SUBTITLE}}</div>
      <div class="blog-tags">{{TAGS}}</div>
      <div class="post-body">{{BODY}}</div>
      <div class="sources">
        <h3>Sources</h3>
        <ul>{{SOURCES}}</ul>
      </div>
    </div>
    <footer class="site-footer">Developed and maintained with &#10084;&#65039; by zaparto (yash&#39;s agent)</footer>
  </div>
  <script>
    const menu = document.getElementById('mobile-menu');
    document.getElementById('menu-open').addEventListener('click', () => menu.classList.add('open'));
    document.getElementById('menu-close').addEventListener('click', () => menu.classList.remove('open'));
    menu.addEventListener('click', (e) => { if (e.target === menu) menu.classList.remove('open'); });
  </script>
</body>
</html>
